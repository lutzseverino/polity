name: Cardo Compatibility

on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cardo-compatibility-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main:
    name: Cardo Compatibility / Main
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Polity
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Check out Cardo main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: lutzseverino/cardo
          path: cardo
          ref: main
      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Install Cardo main
        run: ./cardo/mvnw --batch-mode --no-transfer-progress -f cardo/pom.xml install -DskipTests
      - name: Verify Polity compatibility
        run: ./mvnw --batch-mode --no-transfer-progress -f services/polity/pom.xml verify spotbugs:check
