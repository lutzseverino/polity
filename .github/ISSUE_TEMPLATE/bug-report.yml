name: Bug report
description: Report reproducible behavior that differs from the expected result.
title: "[Area] "
labels: ["bug"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Briefly describe where and when the problem occurs.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reliable sequence that demonstrates the problem.
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant versions, operating system, runtime, deployment, and configuration details.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] Observable corrected behavior"
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List regression checks that should prove the fix.
      placeholder: "- [ ] Automated regression test"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Add logs, screenshots, links, or other context. Remove secrets and personal data.
    validations:
      required: false
