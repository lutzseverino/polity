openapi: 3.0.3
info:
  title: Polity API
  version: 0.1.0
  description: Constitutional government for friend groups.
servers:
  - url: /api/v1
tags:
  - name: Polities
  - name: Members
  - name: Invitations
  - name: Motions
  - name: Offices
  - name: Justice
  - name: Official Record
paths:
  /polities:
    get:
      tags: [Polities]
      operationId: listPolities
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Polities, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/PolityResponse" } } } } }
    post:
      tags: [Polities]
      operationId: createPolity
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePolityRequest" } } } }
      responses:
        "201": { description: Polity created, content: { application/json: { schema: { $ref: "#/components/schemas/PolityResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Polities]
      operationId: getPolity
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Polity, content: { application/json: { schema: { $ref: "#/components/schemas/PolityResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/members:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Members]
      operationId: listPolityMembers
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Members, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MemberResponse" } } } } }
  /polities/{polityId}/invitations:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Invitations]
      operationId: listPolityInvitations
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Membership invitations, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MemberInvitationResponse" } } } } }
    post:
      tags: [Invitations]
      operationId: createPolityInvitation
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateMemberInvitationRequest" } } } }
      responses:
        "201": { description: Membership invitation created, content: { application/json: { schema: { $ref: "#/components/schemas/MemberInvitationResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
  /invitations:
    get:
      tags: [Invitations]
      operationId: listCurrentUserInvitations
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Pending invitations for the current user, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MemberInvitationResponse" } } } } }
  /invitations/{invitationId}/accept:
    parameters: [{ $ref: "#/components/parameters/InvitationId" }]
    post:
      tags: [Invitations]
      operationId: acceptInvitation
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Invitation accepted and membership created, content: { application/json: { schema: { $ref: "#/components/schemas/MemberResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Motions]
      operationId: listPolityMotions
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Motions, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MotionResponse" } } } } }
    post:
      tags: [Motions]
      operationId: createPolityMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateMotionRequest" } } } }
      responses:
        "201": { description: Motion introduced and opened for voting, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/office-assignments:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolityOfficeAssignmentMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateOfficeAssignmentMotionRequest" } } } }
      responses:
        "201": { description: Office assignment motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/sanctions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolitySanctionMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateSanctionMotionRequest" } } } }
      responses:
        "201": { description: Sanction motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/appeals:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolityAppealMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateAppealMotionRequest" } } } }
      responses:
        "201": { description: Appeal motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/constitution-amendments:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolityConstitutionAmendmentMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateConstitutionAmendmentMotionRequest" } } } }
      responses:
        "201": { description: Constitution amendment motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/{motionId}:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    get:
      tags: [Motions]
      operationId: getPolityMotion
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Motion, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/{motionId}/votes:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    put:
      tags: [Motions]
      operationId: castPolityMotionVote
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CastVoteRequest" } } } }
      responses:
        "200": { description: Vote recorded, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/{motionId}/certification:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    post:
      tags: [Motions]
      operationId: certifyPolityMotion
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Result certified and effect applied when passed, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/offices:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Offices]
      operationId: listPolityOffices
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Offices, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OfficeResponse" } } } } }
  /polities/{polityId}/office-terms:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Offices]
      operationId: listPolityOfficeTerms
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Office terms, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OfficeTermResponse" } } } } }
  /polities/{polityId}/sanctions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Justice]
      operationId: listPolitySanctions
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Sanctions, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/SanctionResponse" } } } } }
  /polities/{polityId}/appeals:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Justice]
      operationId: listPolityAppeals
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Appeals, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/AppealResponse" } } } } }
  /polities/{polityId}/record:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Official Record]
      operationId: listPolityOfficialRecord
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Official record, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OfficialRecordEntryResponse" } } } } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    PolityId: { name: polityId, in: path, required: true, schema: { type: string, format: uuid } }
    MotionId: { name: motionId, in: path, required: true, schema: { type: string, format: uuid } }
    InvitationId: { name: invitationId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    BadRequest:
      description: Invalid request.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    NotFound:
      description: Resource not found.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Conflict:
      description: Resource conflicts with current state.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error: { $ref: "#/components/schemas/ApiErrorBody" }
    ApiErrorBody:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
    CreatePolityRequest:
      type: object
      required: [name, visibility]
      properties:
        name: { type: string, minLength: 1, maxLength: 120, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        visibility: { $ref: "#/components/schemas/PolityVisibility" }
    CreateMemberInvitationRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
    CreateMotionRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string, minLength: 1, maxLength: 200, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        body: { type: string, minLength: 1, maxLength: 5000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
    CreateOfficeAssignmentMotionRequest:
      type: object
      required: [officeId, nomineeMembershipId]
      properties:
        officeId: { type: string, format: uuid }
        nomineeMembershipId: { type: string, format: uuid }
    CreateSanctionMotionRequest:
      type: object
      required: [targetMembershipId, type, reason, durationDays]
      properties:
        targetMembershipId: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/SanctionType" }
        reason: { type: string, minLength: 1, maxLength: 5000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        durationDays: { type: integer, minimum: 1 }
    CreateAppealMotionRequest:
      type: object
      required: [sanctionId, reason]
      properties:
        sanctionId: { type: string, format: uuid }
        reason: { type: string, minLength: 1, maxLength: 5000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
    CreateConstitutionAmendmentMotionRequest:
      type: object
      required: [title, body, procedureChanges]
      properties:
        title: { type: string, minLength: 1, maxLength: 200, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        body: { type: string, minLength: 1, maxLength: 10000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        procedureChanges:
          type: array
          minItems: 1
          maxItems: 10
          items: { $ref: "#/components/schemas/CreateProcedureChangeRequest" }
    CreateProcedureChangeRequest:
      type: object
      required: [procedureCode]
      properties:
        procedureCode: { type: string, minLength: 1, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        quorumNumerator: { type: integer, minimum: 1 }
        quorumDenominator: { type: integer, minimum: 1 }
        threshold: { $ref: "#/components/schemas/VotingThreshold" }
        minimumNoticeHours: { type: integer, minimum: 0 }
        votingPeriodHours: { type: integer, minimum: 1 }
    CastVoteRequest:
      type: object
      required: [choice]
      properties:
        choice: { $ref: "#/components/schemas/VoteChoice" }
    VoteChoice: { type: string, enum: ["yes", "no", abstain] }
    PolityVisibility: { type: string, enum: [public, private] }
    InvitationStatus: { type: string, enum: [pending, accepted] }
    VotingThreshold: { type: string, enum: [simple_majority_cast, majority_of_eligible, two_thirds_cast, two_thirds_eligible] }
    SanctionType: { type: string, enum: [warning, suspension] }
    SanctionStatus: { type: string, enum: [active, vacated, expired] }
    AppealStatus: { type: string, enum: [granted] }
    OfficeTermStatus: { type: string, enum: [active, ended] }
    OfficialRecordType:
      type: string
      enum:
        - polity_founded
        - constitution_ratified
        - member_invited
        - member_admitted
        - motion_introduced
        - vote_cast
        - motion_certified
        - resolution_adopted
        - office_assigned
        - sanction_applied
        - appeal_granted
        - constitution_amended
        - motion_rejected
    EffectType: { type: string, enum: [adopt_resolution, assign_office, apply_sanction, grant_appeal, amend_constitution] }
    PowerCode:
      type: string
      enum:
        - admit_member
        - introduce_motion
        - introduce_office_assignment
        - introduce_sanction
        - introduce_appeal
        - introduce_amendment
        - request_certification
    PolityResponse:
      type: object
      required: [id, name, visibility, constitutionVersion, jurisdictionName, institutionName, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        visibility: { $ref: "#/components/schemas/PolityVisibility" }
        constitutionVersion: { type: integer }
        jurisdictionName: { type: string }
        institutionName: { type: string }
        createdAt: { type: string, format: date-time }
    MemberResponse:
      type: object
      required: [id, userId, name, email, status, admittedAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        status: { type: string, enum: [active] }
        admittedAt: { type: string, format: date-time }
    MemberInvitationResponse:
      type: object
      required: [id, polityId, polityName, email, invitedByName, status, invitedAt]
      properties:
        id: { type: string, format: uuid }
        polityId: { type: string, format: uuid }
        polityName: { type: string }
        email: { type: string, format: email }
        invitedByName: { type: string }
        status: { $ref: "#/components/schemas/InvitationStatus" }
        invitedAt: { type: string, format: date-time }
        respondedAt: { type: string, format: date-time }
    VoteTallyResponse:
      type: object
      required: ["yes", "no", abstain, eligible, quorumRequired, quorumMet]
      properties:
        "yes": { type: integer }
        "no": { type: integer }
        abstain: { type: integer }
        eligible: { type: integer }
        quorumRequired: { type: integer }
        quorumMet: { type: boolean }
    CertificationResponse:
      type: object
      required: [passed, explanation, certifiedAt]
      properties:
        passed: { type: boolean }
        explanation: { type: string }
        certifiedAt: { type: string, format: date-time }
    MotionResponse:
      type: object
      required: [id, title, body, status, effectType, constitutionVersion, procedureName, introducedByName, openedAt, votingOpensAt, votingClosesAt, certificationOpensAt, tally]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        status: { type: string, enum: [voting, enacted, rejected] }
        effectType: { $ref: "#/components/schemas/EffectType" }
        constitutionVersion: { type: integer }
        procedureName: { type: string }
        introducedByName: { type: string }
        openedAt: { type: string, format: date-time }
        votingOpensAt: { type: string, format: date-time }
        votingClosesAt: { type: string, format: date-time }
        certificationOpensAt: { type: string, format: date-time }
        tally: { $ref: "#/components/schemas/VoteTallyResponse" }
        certification: { $ref: "#/components/schemas/CertificationResponse" }
    OfficeResponse:
      type: object
      required: [id, code, name, description, termLengthDays]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        termLengthDays: { type: integer }
    OfficeTermResponse:
      type: object
      required: [id, officeId, officeName, membershipId, memberName, status, startedAt, endsAt]
      properties:
        id: { type: string, format: uuid }
        officeId: { type: string, format: uuid }
        officeName: { type: string }
        membershipId: { type: string, format: uuid }
        memberName: { type: string }
        status: { $ref: "#/components/schemas/OfficeTermStatus" }
        startedAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
    SanctionResponse:
      type: object
      required: [id, targetMembershipId, targetName, type, status, reason, startedAt, endsAt]
      properties:
        id: { type: string, format: uuid }
        targetMembershipId: { type: string, format: uuid }
        targetName: { type: string }
        type: { $ref: "#/components/schemas/SanctionType" }
        status: { $ref: "#/components/schemas/SanctionStatus" }
        reason: { type: string }
        startedAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
    AppealResponse:
      type: object
      required: [id, sanctionId, appellantMembershipId, appellantName, status, reason, decidedAt]
      properties:
        id: { type: string, format: uuid }
        sanctionId: { type: string, format: uuid }
        appellantMembershipId: { type: string, format: uuid }
        appellantName: { type: string }
        status: { $ref: "#/components/schemas/AppealStatus" }
        reason: { type: string }
        decidedAt: { type: string, format: date-time }
    OfficialRecordEntryResponse:
      type: object
      required: [id, entryNumber, type, title, body, actorName, constitutionVersion, occurredAt]
      properties:
        id: { type: string, format: uuid }
        entryNumber: { type: integer, minimum: 1 }
        type: { $ref: "#/components/schemas/OfficialRecordType" }
        title: { type: string }
        body: { type: string }
        actorName: { type: string }
        constitutionVersion: { type: integer }
        sourceId: { type: string, format: uuid }
        motionId: { type: string, format: uuid }
        procedureId: { type: string, format: uuid }
        institutionId: { type: string, format: uuid }
        powerCode: { $ref: "#/components/schemas/PowerCode" }
        certificationId: { type: string, format: uuid }
        effectType: { $ref: "#/components/schemas/EffectType" }
        outcome: { type: string }
        occurredAt: { type: string, format: date-time }
