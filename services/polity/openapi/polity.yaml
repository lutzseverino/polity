openapi: 3.0.3
info:
  title: Polity API
  version: 0.1.0
  description: Constitutional government for friend groups.
servers:
  - url: /api/v1
tags:
  - name: Polities
  - name: Constitutions
  - name: Government Structures
  - name: Polity Action Availability
  - name: Members
  - name: Membership Invitations
  - name: Motions
  - name: Office Elections
  - name: Sanctions
  - name: Appeals
  - name: Office Term Reviews
  - name: Constitutional Reviews
  - name: Constitution Amendments
  - name: Disbandments
  - name: Offices
  - name: Office Terms
  - name: Official Record
paths:
  /polity/account:
    post:
      tags: [Polities]
      operationId: provisionPolityAccount
      summary: Provision baseline Polity grants for the current account.
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: Baseline account grants were staged. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /polities:
    get:
      tags: [Polities]
      operationId: listPolities
      summary: List polities accessible to the current user.
      description: When query is supplied, only polity names containing that text are returned.
      parameters:
        - { $ref: "#/components/parameters/SearchQuery" }
        - { $ref: "#/components/parameters/Page" }
        - { $ref: "#/components/parameters/PageSize" }
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Polities, content: { application/json: { schema: { $ref: "#/components/schemas/PolityPageResponse" } } } }
    post:
      tags: [Polities]
      operationId: createPolity
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePolityRequest" } } } }
      responses:
        "201": { description: Polity created, content: { application/json: { schema: { $ref: "#/components/schemas/PolityResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Polities]
      operationId: getPolity
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Polity, content: { application/json: { schema: { $ref: "#/components/schemas/PolityResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/by-slug/{slug}:
    parameters: [{ $ref: "#/components/parameters/PolitySlug" }]
    get:
      tags: [Polities]
      operationId: getPolityBySlug
      summary: Resolve a polity by its canonical user-facing slug.
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Polity, content: { application/json: { schema: { $ref: "#/components/schemas/PolityResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/constitution:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Constitutions]
      operationId: getPolityConstitution
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Current structured constitution, content: { application/json: { schema: { $ref: "#/components/schemas/ConstitutionResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/government:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Government Structures]
      operationId: getPolityGovernment
      summary: Return the current government structure, including its constitution, jurisdiction scope, and live formation state.
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Current government structure, content: { application/json: { schema: { $ref: "#/components/schemas/GovernmentStructureResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/actions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Polity Action Availability]
      operationId: getPolityActions
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Actions available to the current user, content: { application/json: { schema: { $ref: "#/components/schemas/PolityActionAvailabilityResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/members:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Members]
      operationId: listPolityMembers
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Members, content: { application/json: { schema: { $ref: "#/components/schemas/MemberPageResponse" } } } }
  /polities/{polityId}/members/me/resignation:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Members]
      operationId: resignPolityMembership
      summary: Resign the current user's polity membership.
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: Membership resigned and polity access revocation staged. }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/Gone" }
  /polities/{polityId}/invitations:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Membership Invitations]
      operationId: listPolityMembershipInvitations
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Membership invitations, content: { application/json: { schema: { $ref: "#/components/schemas/MembershipInvitationPageResponse" } } } }
    post:
      tags: [Membership Invitations]
      operationId: createPolityMembershipInvitation
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateMembershipInvitationRequest" } } } }
      responses:
        "201": { description: Membership invitation created, content: { application/json: { schema: { $ref: "#/components/schemas/MembershipInvitationResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
  /invitations:
    get:
      tags: [Membership Invitations]
      operationId: listCurrentUserMembershipInvitations
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Pending invitations for the current user, content: { application/json: { schema: { $ref: "#/components/schemas/MembershipInvitationPageResponse" } } } }
  /invitation-tokens/{token}:
    parameters: [{ $ref: "#/components/parameters/MembershipInvitationToken" }]
    get:
      tags: [Membership Invitations]
      operationId: getMembershipInvitationByToken
      summary: Inspect a pending Polity membership invitation using its secret Cardo token.
      responses:
        "200": { description: Pending invitation onboarding context, content: { application/json: { schema: { $ref: "#/components/schemas/MembershipInvitationTokenResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "410": { $ref: "#/components/responses/Gone" }
  /invitation-tokens/{token}/completion:
    parameters: [{ $ref: "#/components/parameters/MembershipInvitationToken" }]
    post:
      tags: [Membership Invitations]
      operationId: requestMembershipInvitationCompletion
      summary: Durably request Cardo-owned identity completion without accepting Polity membership.
      responses:
        "202": { description: Identity completion request accepted, content: { application/json: { schema: { $ref: "#/components/schemas/MembershipInvitationCompletionResponse" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/Gone" }
    get:
      tags: [Membership Invitations]
      operationId: getMembershipInvitationCompletion
      summary: Poll the durable Cardo-owned identity completion state.
      responses:
        "200": { description: Identity completion state, content: { application/json: { schema: { $ref: "#/components/schemas/MembershipInvitationCompletionResponse" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "410": { $ref: "#/components/responses/Gone" }
  /invitations/{invitationId}/accept:
    parameters: [{ $ref: "#/components/parameters/MembershipInvitationId" }]
    post:
      tags: [Membership Invitations]
      operationId: acceptMembershipInvitation
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Invitation accepted and membership created, content: { application/json: { schema: { $ref: "#/components/schemas/MemberResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410": { $ref: "#/components/responses/Gone" }
  /polities/{polityId}/motions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Motions]
      operationId: listPolityMotions
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Motions, content: { application/json: { schema: { $ref: "#/components/schemas/MotionPageResponse" } } } }
    post:
      tags: [Motions]
      operationId: createPolityMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateMotionRequest" } } } }
      responses:
        "201": { description: Motion introduced and opened for voting, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/office-elections:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Office Elections]
      operationId: createPolityOfficeElectionMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateOfficeElectionMotionRequest" } } } }
      responses:
        "201": { description: Office election motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/sanctions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Sanctions]
      operationId: createPolitySanctionMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateSanctionMotionRequest" } } } }
      responses:
        "201": { description: Sanction motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/appeals:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Appeals]
      operationId: createPolityAppealMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateAppealMotionRequest" } } } }
      responses:
        "201": { description: Appeal motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/office-term-reviews:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Office Term Reviews]
      operationId: createPolityOfficeTermReviewMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateOfficeTermReviewMotionRequest" } } } }
      responses:
        "201": { description: Office term review motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/constitutional-reviews:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Constitutional Reviews]
      operationId: createPolityConstitutionalReviewMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateConstitutionalReviewMotionRequest" } } } }
      responses:
        "201": { description: Constitutional review motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/constitution-amendments:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Constitution Amendments]
      operationId: createPolityConstitutionAmendmentMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateConstitutionAmendmentMotionRequest" } } } }
      responses:
        "201": { description: Constitution amendment motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/disbandment:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Disbandments]
      operationId: createPolityDisbandmentMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateDisbandmentMotionRequest" } } } }
      responses:
        "201": { description: Disbandment motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/{motionId}:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    get:
      tags: [Motions]
      operationId: getPolityMotion
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Motion, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/{motionId}/votes:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    put:
      tags: [Motions]
      operationId: castPolityMotionVote
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CastVoteRequest" } } } }
      responses:
        "200": { description: Vote recorded, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/{motionId}/election-ballot:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    put:
      tags: [Office Elections]
      operationId: castPolityOfficeElectionBallot
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CastOfficeElectionBallotRequest" } } } }
      responses:
        "200": { description: Election ballot recorded, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/{motionId}/candidacy:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    put:
      tags: [Office Elections]
      operationId: respondPolityOfficeElectionCandidacy
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RespondOfficeElectionCandidacyRequest" } } } }
      responses:
        "200": { description: Candidacy response recorded, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/{motionId}/certification:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    post:
      tags: [Motions]
      operationId: certifyPolityMotion
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Result certified and effect applied when passed, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/offices:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Offices]
      operationId: listPolityOffices
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Offices, content: { application/json: { schema: { $ref: "#/components/schemas/OfficePageResponse" } } } }
  /polities/{polityId}/office-terms:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Office Terms]
      operationId: listPolityOfficeTerms
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Office terms, content: { application/json: { schema: { $ref: "#/components/schemas/OfficeTermPageResponse" } } } }
  /polities/{polityId}/sanctions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Sanctions]
      operationId: listPolitySanctions
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Sanctions, content: { application/json: { schema: { $ref: "#/components/schemas/SanctionPageResponse" } } } }
  /polities/{polityId}/appeals:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Appeals]
      operationId: listPolityAppeals
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Appeals, content: { application/json: { schema: { $ref: "#/components/schemas/AppealPageResponse" } } } }
  /polities/{polityId}/office-term-reviews:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Office Term Reviews]
      operationId: listPolityOfficeTermReviews
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Office term reviews, content: { application/json: { schema: { $ref: "#/components/schemas/OfficeTermReviewPageResponse" } } } }
  /polities/{polityId}/constitutional-reviews:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Constitutional Reviews]
      operationId: listPolityConstitutionalReviews
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Constitutional reviews, content: { application/json: { schema: { $ref: "#/components/schemas/ConstitutionalReviewPageResponse" } } } }
  /polities/{polityId}/record:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Official Record]
      operationId: listPolityOfficialRecord
      parameters: [{ $ref: "#/components/parameters/Page" }, { $ref: "#/components/parameters/PageSize" }]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Official record, content: { application/json: { schema: { $ref: "#/components/schemas/OfficialRecordEntryPageResponse" } } } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    PolityId: { name: polityId, in: path, required: true, schema: { type: string, format: uuid } }
    MotionId: { name: motionId, in: path, required: true, schema: { type: string, format: uuid } }
    MembershipInvitationId: { name: invitationId, in: path, required: true, schema: { type: string, format: uuid } }
    MembershipInvitationToken: { name: token, in: path, required: true, schema: { type: string, minLength: 1 } }
    PolitySlug: { name: slug, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 80, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" } }
    SearchQuery:
      name: query
      in: query
      required: false
      description: Case-insensitive literal text used to search a collection. Blank values are ignored.
      schema: { type: string, maxLength: 120 }
    Page:
      name: page
      in: query
      required: false
      description: Zero-based page index.
      schema: { type: integer, minimum: 0, default: 0 }
    PageSize:
      name: size
      in: query
      required: false
      description: Number of items per page.
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
  responses:
    BadRequest:
      description: Invalid request.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Forbidden:
      description: The caller is not authorized for this action.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    NotFound:
      description: Resource not found.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Conflict:
      description: Resource conflicts with current state.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Gone:
      description: Resource is no longer available.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error: { $ref: "#/components/schemas/ApiErrorBody" }
    ApiErrorBody:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
    PageMetadata:
      type: object
      required: [size, number, totalElements, totalPages]
      properties:
        size: { type: integer, format: int64, minimum: 1 }
        number: { type: integer, format: int64, minimum: 0 }
        totalElements: { type: integer, format: int64, minimum: 0 }
        totalPages: { type: integer, format: int64, minimum: 0 }
    PolityPageResponse:
      type: object
      required: [content, page]
      properties:
        content: { type: array, items: { $ref: "#/components/schemas/PolityResponse" } }
        page: { $ref: "#/components/schemas/PageMetadata" }
    MemberPageResponse:
      type: object
      required: [content, page]
      properties:
        content: { type: array, items: { $ref: "#/components/schemas/MemberResponse" } }
        page: { $ref: "#/components/schemas/PageMetadata" }
    MembershipInvitationPageResponse:
      type: object
      required: [content, page]
      properties:
        content: { type: array, items: { $ref: "#/components/schemas/MembershipInvitationResponse" } }
        page: { $ref: "#/components/schemas/PageMetadata" }
    MotionPageResponse:
      type: object
      required: [content, page]
      properties:
        content: { type: array, items: { $ref: "#/components/schemas/MotionResponse" } }
        page: { $ref: "#/components/schemas/PageMetadata" }
    OfficePageResponse:
      type: object
      required: [content, page]
      properties:
        content: { type: array, items: { $ref: "#/components/schemas/OfficeResponse" } }
        page: { $ref: "#/components/schemas/PageMetadata" }
    OfficeTermPageResponse:
      type: object
      required: [content, page]
      properties:
        content: { type: array, items: { $ref: "#/components/schemas/OfficeTermResponse" } }
