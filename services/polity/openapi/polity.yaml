openapi: 3.0.3
info:
  title: Polity API
  version: 0.1.0
  description: Constitutional government for friend groups.
servers:
  - url: /api/v1
tags:
  - name: Polities
  - name: Members
  - name: Invitations
  - name: Motions
  - name: Offices
  - name: Justice
  - name: Official Record
paths:
  /polities:
    get:
      tags: [Polities]
      operationId: listPolities
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Polities, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/PolityResponse" } } } } }
    post:
      tags: [Polities]
      operationId: createPolity
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreatePolityRequest" } } } }
      responses:
        "201": { description: Polity created, content: { application/json: { schema: { $ref: "#/components/schemas/PolityResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Polities]
      operationId: getPolity
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Polity, content: { application/json: { schema: { $ref: "#/components/schemas/PolityResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/constitution:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Polities]
      operationId: getPolityConstitution
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Current structured constitution, content: { application/json: { schema: { $ref: "#/components/schemas/ConstitutionResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/actions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Polities]
      operationId: getPolityActions
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Actions available to the current user, content: { application/json: { schema: { $ref: "#/components/schemas/PolityActionAvailabilityResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/members:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Members]
      operationId: listPolityMembers
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Members, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MemberResponse" } } } } }
  /polities/{polityId}/invitations:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Invitations]
      operationId: listPolityInvitations
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Membership invitations, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MemberInvitationResponse" } } } } }
    post:
      tags: [Invitations]
      operationId: createPolityInvitation
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateMemberInvitationRequest" } } } }
      responses:
        "201": { description: Membership invitation created, content: { application/json: { schema: { $ref: "#/components/schemas/MemberInvitationResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
  /invitations:
    get:
      tags: [Invitations]
      operationId: listCurrentUserInvitations
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Pending invitations for the current user, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MemberInvitationResponse" } } } } }
  /invitations/{invitationId}/accept:
    parameters: [{ $ref: "#/components/parameters/InvitationId" }]
    post:
      tags: [Invitations]
      operationId: acceptInvitation
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Invitation accepted and membership created, content: { application/json: { schema: { $ref: "#/components/schemas/MemberResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Motions]
      operationId: listPolityMotions
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Motions, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MotionResponse" } } } } }
    post:
      tags: [Motions]
      operationId: createPolityMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateMotionRequest" } } } }
      responses:
        "201": { description: Motion introduced and opened for voting, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/office-elections:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolityOfficeElectionMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateOfficeElectionMotionRequest" } } } }
      responses:
        "201": { description: Office election motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/sanctions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolitySanctionMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateSanctionMotionRequest" } } } }
      responses:
        "201": { description: Sanction motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/appeals:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolityAppealMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateAppealMotionRequest" } } } }
      responses:
        "201": { description: Appeal motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/constitution-amendments:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolityConstitutionAmendmentMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateConstitutionAmendmentMotionRequest" } } } }
      responses:
        "201": { description: Constitution amendment motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/disbandment:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    post:
      tags: [Motions]
      operationId: createPolityDisbandmentMotion
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateDisbandmentMotionRequest" } } } }
      responses:
        "201": { description: Disbandment motion introduced, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
  /polities/{polityId}/motions/{motionId}:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    get:
      tags: [Motions]
      operationId: getPolityMotion
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Motion, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /polities/{polityId}/motions/{motionId}/votes:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    put:
      tags: [Motions]
      operationId: castPolityMotionVote
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CastVoteRequest" } } } }
      responses:
        "200": { description: Vote recorded, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/{motionId}/election-ballot:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    put:
      tags: [Motions]
      operationId: castPolityOfficeElectionBallot
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CastOfficeElectionBallotRequest" } } } }
      responses:
        "200": { description: Election ballot recorded, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/{motionId}/candidacy:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    put:
      tags: [Motions]
      operationId: respondPolityOfficeElectionCandidacy
      security: [{ bearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RespondOfficeElectionCandidacyRequest" } } } }
      responses:
        "200": { description: Candidacy response recorded, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/motions/{motionId}/certification:
    parameters: [{ $ref: "#/components/parameters/PolityId" }, { $ref: "#/components/parameters/MotionId" }]
    post:
      tags: [Motions]
      operationId: certifyPolityMotion
      security: [{ bearerAuth: [] }]
      responses:
        "201": { description: Result certified and effect applied when passed, content: { application/json: { schema: { $ref: "#/components/schemas/MotionResponse" } } } }
        "409": { $ref: "#/components/responses/Conflict" }
  /polities/{polityId}/offices:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Offices]
      operationId: listPolityOffices
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Offices, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OfficeResponse" } } } } }
  /polities/{polityId}/office-terms:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Offices]
      operationId: listPolityOfficeTerms
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Office terms, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OfficeTermResponse" } } } } }
  /polities/{polityId}/sanctions:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Justice]
      operationId: listPolitySanctions
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Sanctions, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/SanctionResponse" } } } } }
  /polities/{polityId}/appeals:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Justice]
      operationId: listPolityAppeals
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Appeals, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/AppealResponse" } } } } }
  /polities/{polityId}/record:
    parameters: [{ $ref: "#/components/parameters/PolityId" }]
    get:
      tags: [Official Record]
      operationId: listPolityOfficialRecord
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Official record, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/OfficialRecordEntryResponse" } } } } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    PolityId: { name: polityId, in: path, required: true, schema: { type: string, format: uuid } }
    MotionId: { name: motionId, in: path, required: true, schema: { type: string, format: uuid } }
    InvitationId: { name: invitationId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    BadRequest:
      description: Invalid request.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Forbidden:
      description: The caller is not authorized for this action.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    NotFound:
      description: Resource not found.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
    Conflict:
      description: Resource conflicts with current state.
      content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } }
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error: { $ref: "#/components/schemas/ApiErrorBody" }
    ApiErrorBody:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
        details: { type: object, additionalProperties: true }
    CreatePolityRequest:
      type: object
      required: [name, visibility]
      properties:
        name: { type: string, minLength: 1, maxLength: 120, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        visibility: { $ref: "#/components/schemas/PolityVisibility" }
        setupPreset: { $ref: "#/components/schemas/PolitySetupPreset" }
        pace: { $ref: "#/components/schemas/PolityPace" }
    CreateMemberInvitationRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
    CreateMotionRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string, minLength: 1, maxLength: 200, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        body: { type: string, minLength: 1, maxLength: 5000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
    CreateDisbandmentMotionRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string, minLength: 1, maxLength: 200, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        body: { type: string, minLength: 1, maxLength: 5000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
    CreateOfficeElectionMotionRequest:
      type: object
      required: [officeId, candidateMembershipIds]
      properties:
        officeId: { type: string, format: uuid }
        candidateMembershipIds:
          type: array
          minItems: 1
          maxItems: 12
          items: { type: string, format: uuid }
    CreateSanctionMotionRequest:
      type: object
      required: [targetMembershipId, type, reason, durationDays]
      properties:
        targetMembershipId: { type: string, format: uuid }
        type: { $ref: "#/components/schemas/SanctionType" }
        reason: { type: string, minLength: 1, maxLength: 5000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        durationDays: { type: integer, minimum: 1 }
    CreateAppealMotionRequest:
      type: object
      required: [sanctionId, reason]
      properties:
        sanctionId: { type: string, format: uuid }
        reason: { type: string, minLength: 1, maxLength: 5000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
    CreateConstitutionAmendmentMotionRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string, minLength: 1, maxLength: 200, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        body: { type: string, minLength: 1, maxLength: 10000, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        procedureChanges:
          type: array
          maxItems: 10
          items: { $ref: "#/components/schemas/CreateProcedureChangeRequest" }
        officeChanges:
          type: array
          maxItems: 10
          items: { $ref: "#/components/schemas/CreateOfficeChangeRequest" }
        powerChanges:
          type: array
          maxItems: 10
          items: { $ref: "#/components/schemas/CreatePowerChangeRequest" }
    CreateProcedureChangeRequest:
      type: object
      required: [procedureCode]
      properties:
        procedureCode: { type: string, minLength: 1, x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        quorumNumerator: { type: integer, minimum: 1 }
        quorumDenominator: { type: integer, minimum: 1 }
        threshold: { $ref: "#/components/schemas/VotingThreshold" }
        electorate: { $ref: "#/components/schemas/ProcedureElectorate" }
        electorateOfficeCode: { type: string, minLength: 1, maxLength: 64, pattern: "^[a-z][a-z0-9-]*$" }
        minimumNoticeHours: { type: integer, minimum: 0 }
        votingPeriodHours: { type: integer, minimum: 1 }
    CreateOfficeChangeRequest:
      type: object
      required: [action, code]
      properties:
        action: { $ref: "#/components/schemas/ConstitutionOfficeChangeAction" }
        code: { type: string, minLength: 1, maxLength: 64, pattern: "^[a-z][a-z0-9-]*$", x-field-extra-annotation: "@jakarta.validation.constraints.NotBlank" }
        name: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, minLength: 1, maxLength: 1000 }
        termLengthDays: { type: integer, minimum: 1 }
    CreatePowerChangeRequest:
      type: object
      required: [powerCode, holderScope]
      properties:
        powerCode: { $ref: "#/components/schemas/AmendablePowerCode" }
        holderScope: { $ref: "#/components/schemas/PowerHolderScope" }
        holderOfficeCode: { type: string, minLength: 1, maxLength: 64, pattern: "^[a-z][a-z0-9-]*$" }
    CastVoteRequest:
      type: object
      required: [choice]
      properties:
        choice: { $ref: "#/components/schemas/VoteChoice" }
    CastOfficeElectionBallotRequest:
      type: object
      required: [candidateMembershipId]
      properties:
        candidateMembershipId: { type: string, format: uuid }
    RespondOfficeElectionCandidacyRequest:
      type: object
      required: [accepted]
      properties:
        accepted: { type: boolean }
    VoteChoice: { type: string, enum: ["yes", "no", abstain] }
    PolityVisibility: { type: string, enum: [public, private] }
    PolityStatus: { type: string, enum: [active, disbanded] }
    ConstitutionStatus: { type: string, enum: [ratified, superseded] }
    InstitutionKind: { type: string, enum: [assembly] }
    PolitySetupPreset: { type: string, enum: [standard_republic] }
    PolityPace: { type: string, enum: [fast, standard, deliberate] }
    InvitationStatus: { type: string, enum: [pending, accepted] }
    VotingThreshold: { type: string, enum: [simple_majority_cast, majority_of_eligible, two_thirds_cast, two_thirds_eligible, plurality_cast] }
    ProcedureElectorate: { type: string, enum: [active_members, office_holders] }
    SanctionType: { type: string, enum: [warning, suspension] }
    SanctionStatus: { type: string, enum: [active, vacated, expired] }
    AppealStatus: { type: string, enum: [granted] }
    OfficeTermStatus: { type: string, enum: [active, ended] }
    ConstitutionOfficeChangeAction: { type: string, enum: [create, revise, retire] }
    PowerHolderScope: { type: string, enum: [active_member, office] }
    OfficialRecordType:
      type: string
      enum:
        - polity_founded
        - constitution_ratified
        - member_invited
        - member_admitted
        - motion_introduced
        - candidacy_responded
        - vote_cast
        - motion_certified
        - resolution_adopted
        - office_assigned
        - office_elected
        - sanction_applied
        - appeal_granted
        - constitution_amended
        - polity_disbanded
        - motion_rejected
    EffectType: { type: string, enum: [adopt_resolution, assign_office, elect_office, apply_sanction, grant_appeal, amend_constitution, disband_polity] }
    PowerCode:
      type: string
      enum:
        - admit_member
        - introduce_motion
        - introduce_office_election
        - introduce_sanction
        - introduce_appeal
        - introduce_amendment
        - introduce_disbandment
        - request_certification
    AmendablePowerCode:
      type: string
      enum:
        - admit_member
        - introduce_motion
        - introduce_office_election
        - introduce_sanction
        - introduce_appeal
        - introduce_amendment
        - introduce_disbandment
        - request_certification
    PolityResponse:
      type: object
      required: [id, name, visibility, status, constitutionVersion, jurisdictionName, institutionName, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        visibility: { $ref: "#/components/schemas/PolityVisibility" }
        status: { $ref: "#/components/schemas/PolityStatus" }
        constitutionVersion: { type: integer }
        jurisdictionName: { type: string }
        institutionName: { type: string }
        createdAt: { type: string, format: date-time }
    ActionAvailabilityResponse:
      type: object
      required: [available]
      properties:
        available: { type: boolean }
        reason: { type: string }
    PolityActionAvailabilityResponse:
      type: object
      required: [inviteMembers, introduceMotion, introduceOfficeElection, introduceSanction, introduceAppeal, introduceAmendment, introduceDisbandment, requestCertification]
      properties:
        inviteMembers: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
        introduceMotion: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
        introduceOfficeElection: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
        introduceSanction: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
        introduceAppeal: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
        introduceAmendment: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
        introduceDisbandment: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
        requestCertification: { $ref: "#/components/schemas/ActionAvailabilityResponse" }
    ConstitutionResponse:
      type: object
      required: [id, version, status, ratifiedAt, institutions, procedures, offices, powers, bootstrap]
      properties:
        id: { type: string, format: uuid }
        version: { type: integer }
        status: { $ref: "#/components/schemas/ConstitutionStatus" }
        ratifiedAt: { type: string, format: date-time }
        institutions:
          type: array
          items: { $ref: "#/components/schemas/ConstitutionInstitutionResponse" }
        procedures:
          type: array
          items: { $ref: "#/components/schemas/ConstitutionProcedureResponse" }
        offices:
          type: array
          items: { $ref: "#/components/schemas/OfficeResponse" }
        powers:
          type: array
          items: { $ref: "#/components/schemas/ConstitutionPowerResponse" }
        bootstrap: { $ref: "#/components/schemas/ConstitutionBootstrapResponse" }
    ConstitutionInstitutionResponse:
      type: object
      required: [id, name, kind]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        nameKey: { type: string }
        kind: { $ref: "#/components/schemas/InstitutionKind" }
    ConstitutionProcedureResponse:
      type: object
      required: [id, code, name, quorumNumerator, quorumDenominator, threshold, electorate, minimumNoticeHours, votingPeriodHours, effectType]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        nameKey: { type: string }
        quorumNumerator: { type: integer }
        quorumDenominator: { type: integer }
        threshold: { $ref: "#/components/schemas/VotingThreshold" }
