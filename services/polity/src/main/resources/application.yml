spring:
  application:
    name: polity
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/odonta}
    username: ${SPRING_DATASOURCE_USERNAME:odonta}
    password: ${SPRING_DATASOURCE_PASSWORD:odonta}
  flyway:
    table: flyway_schema_history_polity
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration,classpath:db/authorization/publications
    placeholders:
      authorizationSchema: polity_events
  jpa:
    hibernate:
      ddl-auto: validate
  modulith:
    events:
      jdbc:
        schema: polity_events
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${polity.keycloak.base-url}/realms/${polity.keycloak.realm}}
polity:
  api:
    base-path: /api/v1
  membership-invitations:
    accept-url-base: ${POLITY_MEMBERSHIP_INVITATION_ACCEPT_URL_BASE:http://localhost:5173/polities/invitations}
    retry-delay: ${POLITY_MEMBERSHIP_INVITATION_RETRY_DELAY:PT1M}
  keycloak:
    base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:odonta}
    client-id: ${KEYCLOAK_POLITY_CLIENT_ID:polity}
    client-secret: ${KEYCLOAK_POLITY_CLIENT_SECRET:polity-secret}

cardo:
  billing:
    client:
      base-url: ${BILLING_BASE_URL:http://localhost:8085/api/v1}
  identity:
    client:
      base-url: ${IDENTITY_BASE_URL:http://localhost:8081/api/v1}
  invite:
    client:
      base-url: ${INVITE_BASE_URL:http://localhost:8083/api/v1}
server:
  port: ${POLITY_PORT:8084}
management:
  endpoints:
    web:
      exposure:
        include: health,info
springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /docs
